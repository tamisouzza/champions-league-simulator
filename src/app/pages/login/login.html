<div class="login-container">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-card">
        <h2>Welcome Back!</h2>

        <p> Sign in to manage your Champions League Brackets</p>

    <div class="input-group">
        <label>Email Adress </label>
        <input type="email" formControlName="email" placeholder="Your best email">
    </div>

    <div class="input-group">
        <label>Password  </label>
        <input type="password" formControlName="password" placeholder="******">
    </div> <button type="submit" [disabled]="loginForm.valid">Sign in</button>
 </form></div>
